syntax = "proto3";

package datafusion_java;

option java_package = "org.apache.datafusion.protobuf";
option java_multiple_files = true;

// Snapshot of a single physical-plan operator after execution. The
// well-known metrics fields use `optional` so the unset case is
// distinguishable from "tracked, value zero" -- both have meaning to
// callers (e.g. zero spills on a sort that didn't have to spill is a
// real signal). Custom Count-shaped metrics that don't match a
// well-known variant ride on `custom_counters`, keyed by the upstream
// metric name. Suffixed with `Proto` to avoid colliding with the
// public Java record `ExecutedPlan`.
message ExecutedPlanNodeProto {
  string name = 1;
  string display_details = 2;
  optional uint64 output_rows = 3;
  optional uint64 elapsed_compute_nanos = 4;
  optional uint64 output_bytes = 5;
  optional uint64 output_batches = 6;
  optional uint64 spill_count = 7;
  optional uint64 spilled_bytes = 8;
  optional uint64 spilled_rows = 9;
  optional uint64 current_memory_usage = 10;
  map<string, int64> custom_counters = 11;
  repeated ExecutedPlanNodeProto children = 12;
}
