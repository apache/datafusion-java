syntax = "proto3";

package datafusion_java;

option java_package = "org.apache.datafusion.protobuf";
option java_multiple_files = true;

// Setup parameters for constructing a Rerun `TableProvider` and registering
// it into the embedded DataFusion `SessionContext`. These mirror the
// "Class 1" (author-set, not query-derived) parameters from the Spark
// connector design: every executor task receives the same envelope with
// `segments` narrowed to that task's single segment.
message RerunTableOptions {
  // Rerun gRPC endpoint, e.g. "rerun+http://localhost:51234".
  string url = 1;

  // EXACTLY ONE of `dataset_name` or `dataset_id` must be set.
  // - `dataset_name`: resolved server-side via FindEntries(name=...).
  // - `dataset_id`:   parsed directly as a Tuid (skips the FindEntries RPC).
  string dataset_name = 2;
  string dataset_id = 3;

  // Optional explicit segment list. Empty → provider serves all segments
  // (the driver-side `listRerunSegments` JNI is used by the Spark
  // connector to enumerate before partitioning).
  repeated string segments = 4;

  // Optional timeline name to set as `QueryExpression.filtered_index`.
  // Empty → static-only query.
  string index = 5;

  // Optional auth token (Bearer JWT). Empty → `Credentials::Stored`
  // (looks up stored creds for this origin; falls back to REDAP_TOKEN).
  string token = 6;
}
