[package]
name = "datafusion-spark-helper"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
# cdylib for the JVM to load via System.load; rlib so Rust-level tests can
# exercise the WideningTableProvider directly without going through JNI.
crate-type = ["cdylib", "rlib"]

[dependencies]
arrow = { version = "58", features = ["ffi"] }
async-trait = "0.1"
datafusion = { version = "53.1.0" }
datafusion-ffi = "53.1.0"
futures = "0.3"
jni = "0.21"
tokio = { version = "1", features = ["rt-multi-thread"] }
